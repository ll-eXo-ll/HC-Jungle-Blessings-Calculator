<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hero Clash: Dynamic Multi-Faction Canvas (Rev 7 Planner)</title>
    <style>
        :root {
            --locked-gray: rgba(0, 0, 0, 0.4);
            --bg-main: #222222;
            --current-neon: #48d1ff; /* Assigned dynamically by navigation script */
        }
        body { 
            background: var(--bg-main); 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            overflow: hidden; 
        }
        /* Faction Navigation */
        .faction-nav {
            position: fixed; top: 0; width: 100%; height: 50px;
            background: #000; display: flex; justify-content: center;
            align-items: center; gap: 10px; z-index: 2000; border-bottom: 2px solid #222;
        }
        .faction-nav button {
            background: #111; border: 1px solid #444; color: #aaa;
            padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        .faction-nav button.active { 
            border-color: var(--current-neon) !important; 
            color: var(--current-neon) !important; 
            box-shadow: 0 0 10px var(--current-neon); 
        }
        /* HUD Structure Panel */
        .hud {
            position: fixed; top: 50px; width: 100%; background: rgba(0,0,0,0.9);
            padding: 10px; display: flex; justify-content: center; gap: 25px;
            align-items: center; z-index: 1000; border-bottom: 1px solid var(--current-neon);
        }
        .hud b { 
            color: var(--current-neon) !important; 
            font-size: 1.2em; 
            text-shadow: 0 0 5px var(--current-neon); 
        }
        .milestones { display: flex; gap: 8px; align-items: center; }
        .m-chip { font-size: 10px; padding: 3px 6px; border: 1px solid #333; color: #555; border-radius: 3px; }
        .m-chip.active { 
            border-color: var(--current-neon) !important; 
            color: var(--current-neon) !important; 
            box-shadow: 0 0 5px var(--current-neon); 
        }
        /* Multi-Click Modifier Group */
        .amt-selector {
            display: flex; gap: 8px; align-items: center; background: #111;
            padding: 4px 10px; border-radius: 4px; border: 1px solid #444; font-size: 11px;
        }
        #viewport { width: 100vw; height: 100vh; overflow: auto; display: flex; justify-content: center; }
        
        /* MASTER CANVAS VIEWPORT BOX */
        #tree-container { 
            position: relative; 
            height: 640px !important; /* Locks your native 640px vertical grid height */
            margin-top: 130px; 
            transform: scale(1.3);    /* Adjust this scale value up or down to resize the app */
            transform-origin: top center; 
            background-size: 100% 100% !important; /* Forces background to fill the width perfectly */
            background-repeat: no-repeat !important;
            box-sizing: border-box !important;
        }
        /* SVG Vector Path Infrastructure */
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .line { stroke: rgba(255,255,255,0.08); stroke-width: 4; fill: none; stroke-linecap: round; }
        .line.active-path { 
            stroke: var(--current-neon) !important;
            filter: drop-shadow(0 0 4px var(--current-neon)); 
        }
        /* DYNAMIC GOD/VOID HALF-AND-HALF SPECTRUM GLOWS */
        .line.active-path.god-left {
            stroke: #ffd700 !important;
            filter: drop-shadow(0 0 5px #ffd700);
        }
        .line.active-path.god-right {
            stroke: #cc00ff !important;
            filter: drop-shadow(0 0 5px #cc00ff);
        }
        /* --- VISUAL HOTSPOT GRID SETTINGS --- */
        .node {
            position: absolute; 
            cursor: pointer; 
            transform: translate(-50%, -50%);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10;
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box !important;
        }
        /* Moves clip-path here so glows and borders are NEVER cut off by the browser */
        .node::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: transparent;
            box-sizing: border-box;
        }
        /* Dark overlay mask on locked background nodes */
        .node.locked::before {
            background: var(--locked-gray);
        }
        /* Spreads a clean, glowing neon outline directly over active nodes */
        .node.spent {
            filter: drop-shadow(0 0 5px var(--current-neon)) !important;
        }
        .node.spent::before {
            border: 2px solid var(--current-neon) !important;
            background: rgba(255, 255, 255, 0.03);
        }
        /* Pushes your floating numbers completely BELOW the hexagon layout so it's 100% readable */
        .node b {
            font-size: 8px !important;
            font-family: monospace !important;
            line-height: 1 !important;
            color: #fff !important; 
            background: rgba(0, 0, 0, 0.85);
            padding: 1px 3px !important; 
            border-radius: 2px; 
            pointer-events: none; 
            position: absolute;
            bottom: -13px; /* Safely drops the label down underneath the graphic node */
            white-space: nowrap;
            z-index: 30;
        }
        /* --- HERO PORTRAIT FRAME SYSTEM OVERHAUL --- */
        .node.hero-node { 
            z-index: 20; 
        }
        /* Fully transparent locked state removes the unwanted yellow tint over your faces! */
        .node.hero-node.locked::before { 
            background: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* Active hero nodes light up with a gorgeous glowing neon hexagon ring border */
        .node.hero-node.spent {
            filter: drop-shadow(0 0 6px var(--current-neon)) !important;
        }
        .node.hero-node.spent::before {
            border: 2.5px solid var(--current-neon) !important;
            background: transparent !important;
        }
        button.reset { background: #600; color: #fff; border: none; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        /* Dynamic state highlights for the manual budget engine buttons */
        button.budget-active {
            background: #28a745 !important; /* Green alert highlight when Planner Mode is locked in */
            color: #fff !important;
            border-color: #fff !important;
            box-shadow: 0 0 8px rgba(40, 167, 69, 0.5);
        }
        /* FLOATING COMMUNITY WISHLLIST BUTTON */
        .donate-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #FF5E5B;
            color: #fff !important;
            text-decoration: none !important;
            font-family: sans-serif;
            font-size: 12px;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background 0.2s;
        }
        .donate-btn:hover {
            background: #ff4440;
            transform: scale(1.05);
        }

        /* --- REVISION 7 GLOBAL COMBAT STATS DASHBOARD --- */
        .stats-dashboard {
            position: fixed;
            top: 140px;
            left: 20px;
            width: 210px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--current-neon);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            z-index: 2500;
            pointer-events: auto;
            transition: border-color 0.2s;
        }
        .stats-dashboard h3 {
            margin: 0 0 10px 0;
            font-size: 12px;
            letter-spacing: 1px;
            color: var(--current-neon);
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
            text-transform: uppercase;
            text-align: center;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 6px;
            color: #ddd;
        }
        .stat-val {
            font-weight: bold;
            color: #00ffcc;
        }

    </style>
</head>
<body>
    <nav class="faction-nav">
        <button id="btn-human" onclick="loadFaction('human')">Human</button>
        <button id="btn-tree" onclick="loadFaction('tree')">Tree Spirit</button>
        <button id="btn-beast" onclick="loadFaction('beast')">Beastskin</button>
        <button id="btn-night" onclick="loadFaction('night')">Nightfall</button>
        <button id="btn-godvoid" onclick="loadFaction('godvoid')">God/Void</button>

        <!-- --- REVISION 7 MANUAL BUDGET INTEGRATOR FIXED POSITION --- -->
        <span style="display: inline-flex; align-items: center; gap: 6px; margin-left: 15px; border-left: 1px solid #444; padding-left: 15px;">
            <label style="font-size: 11px; font-weight: bold; color: #aaa; font-family: sans-serif;">PLANNER BUDGET:</label>
            <input type="number" id="manual-budget-input" placeholder="Enter points (e.g. 100000)" style="width: 140px; background: #000; color: #0f0; border: 1px solid #444; padding: 4px 6px; font-family: monospace; border-radius: 4px; font-size: 11px;">
            <button id="toggle-budget-btn" onclick="toggleBudgetMode()" style="padding: 4px 10px; font-size: 11px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-weight: bold; cursor: pointer;">ENABLE</button>
        </span>
        <!-- ---------------------------------------------------------- -->
    </nav>

    <!-- REVISION 7 LIVE COMBAT STATS DISPLAY PANEL -->
    <div class="stats-dashboard">
        <h3>Combat Bonuses</h3>
        <div class="stat-row">Flat Attack: <span id="stat-flat-atk" class="stat-val">0</span></div>
        <div class="stat-row">Attack Gain: <span id="stat-pct-atk" class="stat-val">0.00%</span></div>
        <div class="stat-row">Flat HP: <span id="stat-flat-hp" class="stat-val">0</span></div>
        <div class="stat-row">HP Gain: <span id="stat-pct-hp" class="stat-val">0.00%</span></div>
        <div class="stat-row">Faction Buff: <span id="stat-faction" class="stat-val">0.00%</span></div>
    </div>

    <div class="hud">
        <div>POINTS: <b id="pts">0</b></div>
        <div>TECH: <b id="tech">0</b></div>
        
        <div class="amt-selector">
            <span>MULTIPLIER:</span>
            <label><input type="radio" name="amt" value="1" checked> 1</label>
            <label><input type="radio" name="amt" value="5"> 5</label>
            <label><input type="radio" name="amt" value="10"> 10</label>
        </div>

        <div class="milestones">
            <div id="m100" class="m-chip">S (100)</div>
            <div id="m250" class="m-chip">S (250)</div>
            <div id="m450" class="m-chip">S+ (450)</div>
            <div id="m580" class="m-chip">S (580)</div>
            <div id="m820" class="m-chip">S+ (820)</div>
            <div id="m1100" class="m-chip">MAX (1100)</div>
        </div>

        <button onclick="clearCurrentFactionOnly()" style="background: #d46a00; color: #fff; border: none; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-right: 5px;">CLEAR TREE</button>

        <button onclick="location.reload()" class="reset">RESET ALL</button>
    </div>

    <div id="viewport">
        <div id="tree-container">
            <svg id="web-svg"></svg>
            <div id="node-layer"></div>
        </div>
    </div>

    <!-- SAFELY ANONYMOUS CREATOR SUPPORT LINK -->
    <a href="https://throne.com/ll-exo-ll" target="_blank" class="donate-btn">
        🎁 Support the Creator
    </a>
